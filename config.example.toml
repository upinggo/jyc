# JYC Configuration
# Fill in your credentials below. Use ${ENV_VAR} syntax for secrets if preferred.

[general]
max_concurrent_threads = 3
max_queue_size_per_thread = 10

# --- Channel: jiny283 ---

[channels.jiny283]
type = "email"

[channels.jiny283.inbound]
host = "imap.163.com"
port = 993
tls = true
auth_timeout_ms = 30000
username = "jiny283@163.com"
password = "xxxxxxxxxxxx"

[channels.jiny283.outbound]
host = "smtp.163.com"
port = 465
secure = true
username = "jiny283@163.com"
password = "xxxxxxxx"

[channels.jiny283.monitor]
mode = "poll"
poll_interval_secs = 30
max_retries = 5
folder = "INBOX"

[[channels.jiny283.patterns]]
name = "sap"
enabled = true
# Live message injection: when true (default), follow-up messages arriving
# while AI is processing are injected into the active session immediately.
# When false, messages queue and are processed sequentially (one at a time).
# live_injection = false

[channels.jiny283.patterns.rules.sender]
exact = ["ye.jin@sap.com", "kingye@petalmail.com", "qing.cheng@roedl.com"]

[channels.jiny283.patterns.rules.subject]
prefix = ["283", "jiny"]

[channels.jiny283.patterns.attachments]
enabled = true
allowed_extensions = [
  ".pdf",
  ".pptx",
  ".docx",
  ".xlsx",
  ".png",
  ".jpg",
  ".txt",
  ".md",
  ".potx",
]
max_file_size = "25mb"
max_per_message = 10

# --- Channel: jiny283a ---

[channels.jiny283a]
type = "email"

[channels.jiny283a.inbound]
host = "imap.163.com"
port = 993
tls = true
auth_timeout_ms = 30000
username = "jiny283a@163.com"
password = "xxxxxxxxxx"

[channels.jiny283a.outbound]
host = "smtp.163.com"
port = 465
secure = true
username = "jiny283a@163.com"
password = "xxxxxxxxxx"

[channels.jiny283a.monitor]
mode = "poll"
poll_interval_secs = 30
max_retries = 5
folder = "INBOX"

[[channels.jiny283a.patterns]]
name = "jiny-m"
enabled = true

[channels.jiny283a.patterns.rules.sender]
exact = ["ye.jin@sap.com", "kingye@petalmail.com", "kingye283@163.com"]

[channels.jiny283a.patterns.rules.subject]
prefix = ["283a", "jiny", "bs"]

[channels.jiny283a.patterns.attachments]
enabled = true
allowed_extensions = [
  ".pdf",
  ".pptx",
  ".docx",
  ".xlsx",
  ".png",
  ".jpg",
  ".txt",
  ".md",
  ".potx",
]
max_file_size = "25mb"
max_per_message = 10

# --- Feishu Channel Example ---
# Uncomment and configure for Feishu/Lark integration
[channels.feishu_bot]
type = "feishu"
workspace = "./feishu_workspace"
#
[channels.feishu_bot.feishu]
app_id = "cli_xxxxxxxxx"
app_secret = "xxxxxxxxxxxx"
base_url = "https://open.feishu.cn" # or "https://open.larksuite.com" for international

[channels.feishu_bot.feishu.websocket]
enabled = true
reconnect_delay_secs = 5
max_reconnect_attempts = 10
heartbeat_interval_secs = 30

[[channels.feishu_bot.patterns]]
name = "feishu_bot"
enabled = true

# Feishu-specific pattern matching (placeholder - will be implemented)
[channels.feishu_bot.patterns.rules]
mentions = ["jyc"]

# --- Agent ---

[agent]
enabled = true
mode = "opencode"
# mode = "static"
# text = "Thank you for your message."

[agent.opencode]
# Model identifier (e.g., "SiliconFlow/Pro/zai-org/GLM-4.7")
# model = "ark/deepseek-v3.2"

# Small model for lightweight tasks (title generation, compaction)
# small_model = "ark/deepseek-v3.2"

system_prompt = "You are an AI assistant. Respond professionally and concisely."
include_thread_history = false

# Maximum input tokens per session before resetting.
# If not set, uses 95% of the model's context window (auto-detected), or 120K as fallback.
# max_input_tokens = 122880


[agent.attachments]
enabled = true
max_file_size = "10mb"
allowed_extensions = [".ppt", ".pptx", ".doc", ".docx", ".txt", ".md", ".pdf"]

# --- Unified Attachment Configuration ---
# This is the new unified configuration for both inbound and outbound attachments.
# It can be used alongside the per-pattern attachments configuration.
[attachments]

# Inbound attachment configuration (downloading attachments from messages)
[attachments.inbound]
enabled = true
allowed_extensions = [
  ".pdf",
  ".pptx",
  ".docx",
  ".xlsx",
  ".png",
  ".jpg",
  ".txt",
  ".md",
]
max_file_size = "25mb"
max_per_message = 10
# save_path = "./downloads"  # Optional: custom path for downloaded attachments

# Outbound attachment configuration (sending attachments with replies)
[attachments.outbound]
enabled = true
allowed_extensions = [
  ".pdf",
  ".pptx",
  ".docx",
  ".xlsx",
  ".png",
  ".jpg",
  ".txt",
  ".md",
]
max_file_size = "10mb"
max_per_message = 5

# --- Inspect Server ---
# Exposes runtime state via TCP for the TUI dashboard.
# Run `jyc dashboard` to connect.

[inspect]
enabled = true
bind = "127.0.0.1:9876"  # Default; localhost only for security

# --- Vision API ---
# OpenAI-compatible vision API for image analysis.
# The AI agent can call the vision_analyze_image MCP tool to analyze images
