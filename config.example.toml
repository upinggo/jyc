# --- Feishu Channel Example ---
# Uncomment and configure for Feishu/Lark integration
[channels.feishu_bot]
type = "feishu"
workspace = "./feishu_workspace"
#
[channels.feishu_bot.feishu]
app_id = "cli_xxxxxxxxx"
app_secret = "xxxxxxxxxxxx"
base_url = "https://open.feishu.cn" # or "https://open.larksuite.com" for international

[channels.feishu_bot.feishu.websocket]
enabled = true
reconnect_delay_secs = 5
max_reconnect_attempts = 10
heartbeat_interval_secs = 30

[[channels.feishu_bot.patterns]]
name = "feishu_bot"
enabled = true

# Feishu-specific pattern matching (placeholder - will be implemented)
[channels.feishu_bot.patterns.rules]
mentions = ["jyc"]

# --- Agent ---

[agent]
enabled = true
mode = "agent"
# mode = "static"
# text = "Thank you for your message."

# Model identifier (e.g., "SiliconFlow/Pro/zai-org/GLM-4.7").
# This is the lowest-priority fallback in the resolution chain:
#   .jyc/model-override > pattern-level model > channel-level model > global [agent].model
# model = "ark/deepseek-v3.2"

# Optional: a smaller / faster model used for ancillary LLM work, currently:
#   - cycle-boundary progress summary (every `max_iterations` rounds)
#   - between-message context-reset summary (when input tokens cross 95% of
#     the model's context window)
# Falls back to `model` if unset, or if provider construction fails (logged
# as a warning, the agent continues).
# Resolution chain: pattern-level small_model > channel-level small_model > global [agent].small_model
# small_model = "deepseek/deepseek-v4-flash"

system_prompt = "You are an AI assistant. Respond professionally and concisely."

# Maximum iterations per cycle (default: 500)
# max_iterations = 500

# --- Agent providers ---
#
# Define one entry per provider. The `model` and `small_model` keys above
# select which provider/model pair is active using `<provider>/<model-id>`.
#
# `supports_images` (per-provider or per-model, model-level wins) declares
# whether the model accepts native image content blocks. When true, the
# `read_image` built-in tool is registered, and per-pattern
# `inject_inbound_images` (see channel patterns) can take effect.
#
# [agent.providers.deepseek]
# type = "openai-compatible"
# base_url = "https://api.deepseek.com"
# api_key_env = "DEEPSEEK_API_KEY"
# context_window = 128000
#
# [agent.providers.deepseek.models."deepseek-v4-pro"]
# supports_images = true
#
# [agent.providers.anthropic]
# type = "anthropic"
# base_url = "https://api.anthropic.com/v1"
# api_key_env = "ANTHROPIC_API_KEY"
#
# [agent.providers.anthropic.models."claude-opus-4-7"]
# supports_images = true

# --- Agent Vision Fallback ---
#
# When the primary model does not support images (supports_images = false),
# the `read_image` tool can fall back to a separate vision model (e.g.,
# DeepSeek-OCR) to analyze images and return text descriptions.
#
# The `provider` field references a named entry in `[agent.providers]` above
# to reuse its `base_url` and `api_key_env`, avoiding duplicate credentials.
#
# [agent.vision]
# enabled = true
# provider = "deepseek"
# model = "deepseek-ocr"
# # Optional: custom prompt sent to the vision model alongside each image
# # prompt = "请仔细识别并提取图片中的所有文字内容"


[agent.attachments]
enabled = true
max_file_size = "10mb"
allowed_extensions = [".ppt", ".pptx", ".doc", ".docx", ".txt", ".md", ".pdf"]

# --- Unified Attachment Configuration ---
# This is the new unified configuration for both inbound and outbound attachments.
# It can be used alongside the per-pattern attachments configuration.
[attachments]

# Inbound attachment configuration (downloading attachments from messages)
[attachments.inbound]
enabled = true
allowed_extensions = [
  ".pdf",
  ".pptx",
  ".docx",
  ".xlsx",
  ".png",
  ".jpg",
  ".txt",
  ".md",
]
max_file_size = "25mb"
max_per_message = 10
# save_path = "./downloads"  # Optional: custom path for downloaded attachments

# Outbound attachment configuration (sending attachments with replies)
[attachments.outbound]
enabled = true
allowed_extensions = [
  ".pdf",
  ".pptx",
  ".docx",
  ".xlsx",
  ".png",
  ".jpg",
  ".txt",
  ".md",
]
max_file_size = "10mb"
max_per_message = 5

# --- Inspect Server ---
# Exposes runtime state via TCP for the TUI dashboard.
# Run `jyc dashboard` to connect.

[inspect]
enabled = true
bind = "127.0.0.1:9876"  # Default; localhost only for security

