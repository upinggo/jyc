# JYC Configuration
# Fill in your credentials below. Use ${ENV_VAR} syntax for secrets if preferred.

[general]
max_concurrent_threads = 3
max_queue_size_per_thread = 10

# --- Channel: jiny283 ---

[channels.jiny283]
type = "email"

[channels.jiny283.inbound]
host = "imap.163.com"
port = 993
tls = true
auth_timeout_ms = 30000
username = "jiny283@163.com"
password = "xxxxxxxxxxxx"

[channels.jiny283.outbound]
host = "smtp.163.com"
port = 465
secure = true
username = "jiny283@163.com"
password = "xxxxxxxx"

[channels.jiny283.monitor]
mode = "poll"
poll_interval_secs = 30
max_retries = 5
folder = "INBOX"

# Footer configuration: controls whether model/mode/tokens footer is appended to replies.
# Default is enabled = true when omitted. Set enabled = false to disable the footer.
# [channels.jiny283.footer]
# enabled = true

# Per-channel model override: takes priority over global [agent].model,
# but below per-pattern model override.
# model = "anthropic/claude-opus-4-6"
# small_model = "deepseek/deepseek-v4-flash"

[[channels.jiny283.patterns]]
name = "xxx"
enabled = true

# Per-pattern model override: takes priority over channel-level and global
# [agent].model, but below the runtime .jyc/model-override file.
# model = "anthropic/claude-opus-4-6"
# small_model = "deepseek/deepseek-v4-flash"

# Live message injection: when true (default), follow-up messages arriving
# while AI is processing are injected into the active session immediately.
# When false, messages queue and are processed sequentially (one at a time).
# live_injection = false

# Auto-inject inbound `image/*` attachments into the first user turn of the
# agent loop as multimodal content blocks. Default: false. Only takes effect
# when the active model has `supports_images = true`. When false, image
# attachments stay on disk and the agent must use the `read_image` built-in
# tool to load them on demand.
# inject_inbound_images = true

[channels.jiny283.patterns.rules.sender]
exact = ["kingye@petalmail.com"]

[channels.jiny283.patterns.rules.subject]
prefix = ["283", "jiny"]

[channels.jiny283.patterns.attachments]
enabled = true
allowed_extensions = [
  ".pdf",
  ".pptx",
  ".docx",
  ".xlsx",
  ".png",
  ".jpg",
  ".txt",
  ".md",
  ".potx",
]
max_file_size = "25mb"
max_per_message = 10

