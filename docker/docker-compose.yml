services:
  jyc:
    image: jyc:${JYC_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    network_mode: host
    volumes:
      # JYC data directory (config.toml, .env, channels, workspace)
      - ${JYC_DATA_DIR:-./}:/opt/jyc

      # OpenCode global config (API keys, providers, model settings)
      - ${OPENCODE_CONFIG}:/root/.config/opencode/opencode.jsonc:ro

      # OpenCode data (sessions DB, logs, snapshots — persisted across restarts)
      - ${OPENCODE_DATA_DIR:-opencode-data}:/root/.local/share/opencode

      # Skills (read-only — used by OpenCode AI)
      - ${CLAUDE_SKILLS_DIR:-~/.claude/skills}:/root/.claude/skills:ro
      - ${AGENT_SKILLS_DIR:-~/.agents/skills}:/root/.agents/skills:ro

      # Project source directories (mounted into thread workspaces for AI access)
      # The AI's working directory is the thread dir, so source must be inside the workspace.
      # Customize per your channel/thread layout. Example:
      #   - /path/to/project:/opt/jyc/<channel>/workspace/<thread>/project

      # Git/GitHub credentials
      - ${JYC_DATA_DIR}/.netrc:/root/.netrc
      - ${JYC_DATA_DIR}/gh_hosts.yml:/root/.config/gh/hosts.yml
    restart: unless-stopped

# Named volumes
volumes:
  opencode-data:    # OpenCode sessions, logs
