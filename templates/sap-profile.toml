[[mcps]]
type = "remote"
url = "https://mcp.jira.tools.sap/mcp"
name = "sap.tools.jira.mcp/mcp"
enabled = true

[[mcps]]
type = "local"
name = "ui5-mcp"
command = ["npx", "-y", "@ui5/mcp-server@latest"]
timeout = 300000

[[mcps]]
type = "local"
name = "fiori-tools"
command = ["npx", "-y", "@sap-ux/fiori-mcp-server@0.6.47", "fiori-mcp"]
timeout = 300000

[[mcps]]
type = "local"
name = "figma"
command = ["npx", "-y", "figma-developer-mcp@latest", "--stdio"]
timeout = 300000

# Playwright — browser automation, UI testing, screenshot capture
[[mcps]]
name = "playwright"
type = "local"
command = ["npx", "-y", "@executeautomation/playwright-mcp-server"]
timeout = 300000

# Planner: Jira for requirements context, Figma for design reading
[templates.github-planner]
mcps = ["sap.tools.jira.mcp/mcp", "figma"]
skills = ["sap-cap-ui5-dev"]
context_files = ["context/sap-project-background.md"]

[templates.github-high-level-planner]
mcps = ["sap.tools.jira.mcp/mcp"]
skills = ["sap-cap-ui5-dev"]

# Developer: common SAP capabilities
[templates.github-developer]
mcps = ["ui5-mcp", "fiori-tools"]
skills = ["sap-cap-ui5-dev"]
context_files = ["context/sap-project-background.md"]

# Developer overrides for specific repos (selected via --repo)
[templates.github-developer.repos."user/fiori-design-app"]
mcps = ["figma", "playwright"]
skills = ["sap-fiori-review"]
context_files = ["context/fiori-design-guidelines.md"]

[templates.github-developer.repos."user/cap-backend-service"]
skills = ["incremental-dev"]

# Reviewer: common SAP capabilities
[templates.github-reviewer]
mcps = ["sap.tools.jira.mcp/mcp", "ui5-mcp"]
skills = ["sap-cap-ui5-dev", "sap-fiori-review"]
context_files = ["context/sap-project-background.md"]

# Reviewer overrides for specific repos
[templates.github-reviewer.repos."user/fiori-design-app"]
mcps = ["figma"]
